<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>סוכן מכירות — פלטינום</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--gold:#d4af37;--gold2:#f0d060;--bg:#f4f6fb;--white:#fff;--border:#e8ecf4;--green:#22c55e;--red:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;direction:rtl}

/* HEADER */
.hdr{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.hdr-brand{font-size:1.1rem;font-weight:900;color:var(--gold)}
.hdr-sub{font-size:.75rem;color:rgba(255,255,255,.6)}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.container{max-width:800px;margin:0 auto;padding:16px}

/* STAGE SELECTOR */
.stage-wrap{background:var(--white);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,39,68,.08);border:1.5px solid var(--border)}
.stage-label{font-size:.82rem;font-weight:700;color:var(--navy);margin-bottom:10px;opacity:.7}
.stages{display:flex;flex-wrap:wrap;gap:8px}
.stage-btn{padding:8px 14px;border:2px solid var(--border);border-radius:20px;background:var(--bg);cursor:pointer;font-size:.82rem;font-weight:600;color:var(--navy);font-family:'Heebo',sans-serif;transition:all .15s}
.stage-btn:hover{border-color:var(--gold);background:#fffbeb}
.stage-btn.active{border-color:var(--gold);background:var(--gold);color:var(--navy);font-weight:800}

/* QUICK OBJECTIONS */
.obj-wrap{background:var(--white);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,39,68,.08);border:1.5px solid var(--border)}
.obj-label{font-size:.82rem;font-weight:700;color:var(--navy);margin-bottom:10px;opacity:.7}
.obj-grid{display:flex;flex-wrap:wrap;gap:7px}
.obj-btn{padding:7px 13px;border:1.5px solid #fcd34d;border-radius:20px;background:#fffbeb;cursor:pointer;font-size:.8rem;font-weight:600;color:#92400e;font-family:'Heebo',sans-serif;transition:all .15s}
.obj-btn:hover{background:#fef3c7;border-color:#f59e0b}
.obj-btn.active{background:#f59e0b;border-color:#d97706;color:#fff}

/* INPUT */
.input-wrap{background:var(--white);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,39,68,.08);border:1.5px solid var(--border)}
.input-label{font-size:.82rem;font-weight:700;color:var(--navy);margin-bottom:8px;opacity:.7}
.input-row{display:flex;gap:10px}
textarea{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.93rem;font-family:'Heebo',sans-serif;resize:none;height:70px;direction:rtl;background:#fafbfc;transition:border .2s}
textarea:focus{outline:none;border-color:var(--gold);background:#fff}
.ask-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:10px;padding:0 22px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .2s;white-space:nowrap;align-self:stretch}
.ask-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,175,55,.4)}
.ask-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* RESPONSES */
.responses{display:flex;flex-direction:column;gap:12px}
.resp-card{background:var(--white);border-radius:14px;padding:18px 20px;box-shadow:0 2px 12px rgba(26,39,68,.08);border-right:4px solid var(--gold);border-left:1.5px solid var(--border);border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);position:relative}
.resp-num{display:inline-block;background:var(--gold);color:var(--navy);border-radius:50%;width:24px;height:24px;font-size:.78rem;font-weight:900;text-align:center;line-height:24px;margin-bottom:10px}
.resp-text{font-size:.93rem;line-height:1.75;color:var(--navy);white-space:pre-wrap}
.copy-btn{position:absolute;top:14px;left:14px;background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:700;cursor:pointer;color:#6b7a99;font-family:'Heebo',sans-serif;transition:all .15s}
.copy-btn:hover{border-color:var(--gold);color:var(--navy);background:#fffbeb}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:#f0fdf4}

/* LOADING */
.loading{text-align:center;padding:32px;color:#6b7a99}
.loading-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin:0 3px;animation:ldot 1s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#6b7a99;background:var(--white);border-radius:14px;box-shadow:0 2px 12px rgba(26,39,68,.08)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty p{font-size:.9rem;line-height:1.6}

/* API KEY */
.api-wrap{background:#fff3cd;border:1.5px solid #ffc107;border-radius:14px;padding:16px;margin-bottom:14px}
.api-wrap label{display:block;font-size:.82rem;font-weight:700;color:#856404;margin-bottom:8px}
.api-input-row{display:flex;gap:8px}
.api-input-row input{flex:1;padding:10px 14px;border:1.5px solid #ffc107;border-radius:8px;font-size:.88rem;font-family:'Heebo',sans-serif;background:#fff}
.api-save-btn{background:#ffc107;color:#000;border:none;border-radius:8px;padding:0 16px;font-size:.88rem;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif}

/* TIP */
.tip{background:#e8f4fd;border:1.5px solid #bfdbfe;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.8rem;color:#1e40af;line-height:1.5}
.tip strong{font-weight:800}

@media(max-width:500px){
  .input-row{flex-direction:column}
  .ask-btn{height:44px}
  .stages{gap:6px}
  .stage-btn{font-size:.78rem;padding:7px 11px}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-brand">💬 סוכן מכירות AI</div>
    <div class="hdr-sub">פלטינום כתב שירות</div>
  </div>
  <div style="font-size:.8rem;color:rgba(255,255,255,.7)">
    <span class="status-dot"></span>מוכן לשיחה
  </div>
</div>

<div class="container">

  <!-- API KEY -->
  <div class="api-wrap" id="api-wrap">
    <label>🔑 הכנס Anthropic API Key</label>
    <div class="api-input-row">
      <input type="password" id="api-key" placeholder="sk-ant-api03-..." />
      <button class="api-save-btn" onclick="saveKey()">שמור</button>
    </div>
  </div>

  <!-- TIP -->
  <div class="tip">
    <strong>איך משתמשים:</strong> בחר שלב בשיחה → לחץ על התנגדות נפוצה או כתוב מה הלקוח אמר → קבל 3 תשובות מוכנות
  </div>

  <!-- STAGE -->
  <div class="stage-wrap">
    <div class="stage-label">📍 שלב בשיחה</div>
    <div class="stages">
      <button class="stage-btn active" onclick="setStage(this,'פתיחה — ליד חם')">🔥 ליד חם</button>
      <button class="stage-btn" onclick="setStage(this,'פתיחה — ליד קר')">🧊 ליד קר</button>
      <button class="stage-btn" onclick="setStage(this,'החזרת לקוח שבוטל')">🔄 לקוח חוזר</button>
      <button class="stage-btn" onclick="setStage(this,'הצגת ערך')">💎 הצגת ערך</button>
      <button class="stage-btn" onclick="setStage(this,'שאלות רפואיות')">🏥 שאלות רפואיות</button>
      <button class="stage-btn" onclick="setStage(this,'סגירה')">✅ סגירה</button>
      <button class="stage-btn" onclick="setStage(this,'התנגדויות')">🛡️ התנגדויות</button>
    </div>
  </div>

  <!-- OBJECTIONS -->
  <div class="obj-wrap">
    <div class="obj-label">⚡ התנגדויות נפוצות — לחץ לבחירה מהירה</div>
    <div class="obj-grid">
      <button class="obj-btn" onclick="setObj(this,'זה יקר לי, אני לא יכול להרשות לעצמי')">💸 יקר לי</button>
      <button class="obj-btn" onclick="setObj(this,'שלח לי מידע ואני אסתכל ואחזור אלייך')">📧 שלח לי מידע</button>
      <button class="obj-btn" onclick="setObj(this,'אין לי זמן עכשיו, תתקשר אליי מאוחר יותר')">⏰ אין זמן עכשיו</button>
      <button class="obj-btn" onclick="setObj(this,'יש לי כבר ביטוח בריאות פרטי')">🛡️ יש לי ביטוח</button>
      <button class="obj-btn" onclick="setObj(this,'זה נראה לי הונאה, אני לא בטוח שזה אמיתי')">🚨 נראה הונאה</button>
      <button class="obj-btn" onclick="setObj(this,'אני לא מבין בדברים האלה, לא בעניינים')">❓ לא מבין</button>
      <button class="obj-btn" onclick="setObj(this,'אני בריא ברוך השם, לא צריך עכשיו')">💪 אני בריא</button>
      <button class="obj-btn" onclick="setObj(this,'צריך להתייעץ עם בן/בת הזוג לפני שאני מחליט')">👫 צריך להתייעץ</button>
      <button class="obj-btn" onclick="setObj(this,'לא מעוניין, תודה')">❌ לא מעוניין</button>
      <button class="obj-btn" onclick="setObj(this,'צריך לחשוב על זה, אחזור אלייך')">🤔 צריך לחשוב</button>
      <button class="obj-btn" onclick="setObj(this,'אין לי כרטיס אשראי ביד עכשיו')">💳 אין כרטיס ביד</button>
      <button class="obj-btn" onclick="setObj(this,'כבר יש לי כתב שירות ממקום אחר')">📋 יש לי כתב שירות</button>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-label">✍️ מה הלקוח אמר? (כתוב בחופשיות)</div>
    <div class="input-row">
      <textarea id="customer-said" placeholder="למשל: &quot;תקשיב, אני לא בטוח שזה בשבילי...&quot;"></textarea>
      <button class="ask-btn" id="ask-btn" onclick="getResponse()">קבל<br>תשובות</button>
    </div>
  </div>

  <!-- RESPONSES -->
  <div id="output">
    <div class="empty">
      <div class="empty-icon">🎯</div>
      <p>בחר שלב + התנגדות<br>או כתוב מה הלקוח אמר<br>ולחץ <strong>"קבל תשובות"</strong></p>
    </div>
  </div>

</div>

<script>
let currentStage = 'פתיחה';
let apiKey = localStorage.getItem('sales_api_key') || '';

// Init
if (apiKey) {
  document.getElementById('api-key').value = apiKey;
  document.getElementById('api-wrap').style.background = '#f0fdf4';
  document.getElementById('api-wrap').style.borderColor = '#22c55e';
}

function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('sales_api_key', k);
  const wrap = document.getElementById('api-wrap');
  wrap.style.background = '#f0fdf4';
  wrap.style.borderColor = '#22c55e';
  wrap.querySelector('label').textContent = '✅ API Key שמור';
}

function setStage(el, stage) {
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentStage = stage;
}

function setObj(el, text) {
  document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('customer-said').value = text;
}

async function getResponse() {
  if (!apiKey) {
    alert('הכנס API Key קודם');
    return;
  }
  const customerSaid = document.getElementById('customer-said').value.trim();
  if (!customerSaid) {
    alert('כתוב מה הלקוח אמר');
    return;
  }

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;

  document.getElementById('output').innerHTML = `
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px;font-size:.88rem">מכין תשובות...</p>
    </div>`;

  const systemPrompt = `אתה סוכן מכירות מנוסה של פלטינום כתב שירות — כתב שירות רפואי פרטי משלים.
החברה: פלטינום רפואה משלימה בע"מ | ח.פ 515443554 | מאז 2016 | עשרות אלפי לקוחות מרוצים | כ-100 נציגים ומשווקים.

===מחירים===
- מחיר מקור: 350 ש"ח. מחיר היכרות/מבצע: 248 ש"ח קבוע לכל החיים
- אפשר להוריד ל-220 ש"ח דרך מנהל (אישור חריג), ובמקרים קיצוניים ל-198 ש"ח
- ללא הצהרת בריאות — כולם מתקבלים, כל גיל, כל מצב רפואי
- 3 חודשי אכשרה מיום ההצטרפות (לרוב הכיסויים)
- ביטול בכל עת ללא קנס
- שירות לקוחות: *3779 | 074-7694890 | info@platinum.org.il
- הגשת תביעות: WhatsApp / אימייל / אתר — תשלום תוך 72 שעות

===קווי המוצר של פלטינום===

** 1. פלטינום רופא עד הבית (תקרה שנתית 3,000 ש"ח) **
- רופא עד הבית: השתתפות עצמית 35 ש"ח לביקור (שעות פעילות 9:00-16:00)
- רופא אונליין בווידאו/טלפון: 25 ש"ח, תוך 30 דקות
- פינוי באמבולנס: עד 600 ש"ח, עד 2 פעמים בשנה

** 2. פלטינום בריאות — תוכנית בסיס (תקרה שנתית 13,000 ש"ח) **
- 5 ייעוצים אצל מומחה: 80% עד 800 ש"ח לייעוץ 1-2, עד 400 ש"ח לייעוצים 3-5
- MRI: 80% עד 3,000 ש"ח לשנה | הדמיות אחרות (CT, אולטרסאונד): 80% עד 1,500 ש"ח
- סה"כ תקרת הדמיות: 11,000 ש"ח לשנה
- בדיקות מניעה (גיל 45+): ממוגרפיה, PAP, צפיפות עצם, PSA — 80% עד 1,000 ש"ח, פעם ב-2 שנים
- פיזיותרפיה/הידרותרפיה: 10 טיפולים/שנה, 80% עד 150 ש"ח לטיפול, תקרה 1,200 ש"ח
- תזונאי/ת: 10 ביקורים/שנה, 80% עד 120 ש"ח, תקרה 1,200 ש"ח
- אמבולנס: 80% עד 600 ש"ח, תקרה 1,200 ש"ח לשנה
- ייעוץ זכויות: 2 ייעוצים בשנה ללא עלות
- מכשירים אורתופדיים: 80% עד 1,000 ש"ח לשנה
- 3 חודשי אכשרה לרוב הכיסויים

** 3. פלטינום בריאות פרימיום — תוספת (תקרה שנתית 10,000 ש"ח) **
- מעבדת שינה: 80% עד 1,000 ש"ח
- אי-סבילות למזון: 80% עד 2,000 ש"ח
- קפסולה אנדוסקופית: 80% עד 3,000 ש"ח (פעם ב-3 שנים)
- מרפאות כאב: 80% עד 150 ש"ח, 12 טיפולים/שנה
- תאי לחץ: 80% עד 180 ש"ח, 5 טיפולים/שנה
- ליווי סיעודי: ללא עלות — ביטוח לאומי, רשיון עובד זר, רכב נכה, הכנה לוועדה רפואית
- הריון מורחב: עד 6,000 ש"ח סה"כ להריון
- קורס לידה: 80% עד 300 ש"ח | דולה: 80% עד 1,500 ש"ח
- מלון לידה: 80% עד 200 ש"ח ליום (7 ימים)
- יועצת הנקה: 80% עד 200 ש"ח לפגישה, פעם בחודש עד גיל שנה
- אבחון ADHD (TOVA, BRC, MOXO) + טיפולים התפתחותיים לילדים
- 6 חודשי אכשרה לרוב כיסויי הפרימיום

** 4. פלטינום רפואה משלימה (תקרה שנתית 2,500 ש"ח) **
- 20 טיפולים לשנה, 80% עד 150 ש"ח לטיפול
- 21 סוגי טיפולים: דיקור סיני, רפלקסולוגיה, שיאצו, אוסטאופתיה, כירופרקטיקה, הומאופתיה, פלדנקרייז, ביופידבק, נטורופתיה, דיאטנית, מלחיות, פיזיותרפיה, אירוודה, הידרותרפיה ועוד
- חלק ניתן לקבל בבית: רפלקסולוגיה, שיאצו, טווינא, לומי לומי
- השתתפות עצמית: 40 ש"ח לטיפול (מרפאה) | 65 ש"ח לטיפול (בבית)
- 3 חודשי אכשרה

** 5. פלטינום דנטל **
- רשת שיניים של ד"ר בוכניק — 24 מרפאות ברחבי הארץ
- ללא עלות: בדיקות, צילומים, כתרים זמניים
- הנחות משמעותיות: עקירות, סתימות, טיפולי שורש, כתרים קבועים, השתלות, יישור שיניים

** 6. לחצן מצוקה (בשיתוף קבוצת אנוש) **
- לחצן בית + לחצן נייד (צמיד/שרשרת) — כלול במנוי
- שעון חכם (אופציה): GPS, זיהוי נפילה, לחץ דם, רמת חמצן, דופק
- מוקד מאויש 24/7 — מגיב לכל קריאה
- מחבר לשירותי חירום: משטרה, מד"א, כבאות
- בעלי מקצוע לחירום: חשמלאי, מנעולן, נגר

===מה שחשוב להסביר===
1. פלטינום לא מחליף קופת החולים — משלים את מה שחסר. אפשר להגיש גם לביטוח פרטי וגם לפלטינום
2. "אני לא מציע לך ביטוח סיעודי — אני נותן לך ליווי בסיעוד, השלמה שאין לך דרך הקופה ולא דרך ביטוחים"
3. ביטוח סיעודי = קצבה כסף בלבד אם מגיעים למצב קשה. כתב שירות = שירות ממשי, ליווי, רופאים, טיפולים — כל יום
4. "לבנת פורן, זכותי, מגן לוקחים 40,000-50,000 ש"ח מהקצבה שלך. אנחנו עושים את אותו הדבר בתוך המנוי"
5. חברות ביטוח שולחות מעקבים כדי לא לשלם. פה אין מעקבים, ממש לא
6. הלקוח הולך לכל רופא שרוצה — לא רק בהסדר הקופה, 80% החזר על קבלה מקורית

===תסריט לידים חמים (מילאו שאלון)===
פתיחה: "שלום [שם]? מדבר מאור מהבריאות והסיעוד, השיווק של פלטינום. מה שלומך? קיבלתי את הפרטים שלך — מילאת שאלון קצר באתר לבדיקת זכאות. נכון?"
עיבוד: "אז על פי מה שמילאת — אתה בגיל ___, מבוטח ב___ ומה שאתה מחפש זה ___. בדיוק בשביל זה מתאים לך כתב השירות של פלטינום."
הצגת ערך: "רופא עד הבית, MRI ו-CT עם 80% החזר, פיזיותרפיה 10 טיפולים בשנה, 20 טיפולי רפואה משלימה — הכל ללא הצהרת בריאות. עלות רגילה 350 — כי מילאת שאלון יש לך 248 ש"ח קבוע לכל החיים."

===תסריט לידים קרים (שיחה יזומה)===
פתיחה: "שלום [שם]? שבוע טוב. מדבר מאור מהבריאות והסיעוד, דרך השיווק של פלטינום. אני יוצר איתך קשר כי היום אתה מבוטח דרך קופת החולים בכיסוי סיעודי לחמש שנים הראשונות. את/ה מכיר את הכיסוי הזה?"
הסבר הכיסוי: "הכיסוי הזה הוא פיצוי כסף בלבד — עד 5,000 ש"ח ב-5 שנים. באוקטובר האחרון הייתה רפורמה בביטוח הבריאות שנותנת למבוטחים שיפוי מורחב. תכף אסביר מה זה אומר לגביך."
הצגת ערך: "מהיום, חוץ מהכסף, יהיה לך גם ליווי מלא: רופאים מומחים מכל קופה, פיזיותרפיה, רפואה משלימה, ואם חס וחלילה תגיע למצב סיעודי — אנחנו מטפלים בכל הניירת: ביטוח לאומי, תו נכה, עובד זר, הכנה לוועדה. בלי פלטינום זה נופל על הילדים."

===שאלות רפואיות (חובה לשאול לפני סגירה)===
1. "היה לך שינויים במצב הרפואי בשנה האחרונה?"
2. "האם עישנת סיגריות בשנה האחרונה?"
3. "חס וחלילה חלית בשנה האחרונה במחלה קשה כגון סרטן, מחלות לב, שבץ?"
אם הכל תקין: "מצוין, ברוך השם. יש אישור ראשוני. אז מה שנעשה עכשיו — מצרף אותך ב-248 ש"ח קבוע."

===הורדת מחיר — טכניקת מנהל===
שלב 1: "תמציא איתי רגע על הקו — אני הולך לבדוק עם המנהל."
שלב 2 (אחרי 30 שניות): "תקשיב, לא יודע איך הצלחתי — זה אישור חריג מאוד. הצלחתי להשיג לך 220 ש"ח. זה כמעט לא קורה."
חיזוק: "זה פחות מ-10 שקל ביום על הבריאות שלך. כמו שאתה מבטח רכב — גם את עצמך צריך לבטח."

===בונוס מנהל (שימוש מדי פעם)===
"המנהלת שלי שמעה את המצב — היא החליטה לתת לך 30 טיפולים במקום 20 מתנה. זה ממש לא קורה."

===סגירה===
"לאיזה כרטיס להתייחס — ויזה או ישראכרט?"
"תן לי את המספר משמאל ימין בבקשה."
"שמור את הכרטיס — תצטרך להקריא אותו שוב בשיחת הסיכום שתגיע תוך 2-3 דקות."
"בן/בת הזוג יכולים להצטרף בדיוק באותו מחיר — ללא הצהרת בריאות."

===התמודדות עם חשד שזה הונאה===
"אדם שרוצה לעקוץ לא יגיד לך את כל הפרטים שלך. אנחנו פלטינום רפואה משלימה בע"מ — ח.פ 515443554, פועלים מ-2016, עשרות אלפי לקוחות. שירות לקוחות כוכבית 3779. אני שולח לך את כל הניירת בכתב."

===תסריט החזרת לקוח (היה ובוטל)===
פתיחה: "היי [שם], מה שלומך? מדברת שקד משיווק הפלטינום. אני יוצרת איתך קשר בהמשך לליווי בסיעוד שהיה לך. אני רואה שבוטל — עקב אמצעי גבייה? או כי העלות הייתה גבוהה?"
אם עלות גבוהה: "נכון, בעבר שילמת יותר. אחרי הרפורמה — המחיר קבוע לכולם: 248 ש"ח שלא ישתנה."
בדיקה רפואית: "רק לבדוק אם אפשר להחזיר לך — היה לך שינויים במצב הרפואי? עישנת?"
סגירה: "תהיה איתי כמה רגעים על הקו, אני בודק אישור."

===טיפול בהתנגדות "יש לי ביטוח בריאות פרטי"===
- פלטינום לא מחליף — משלים. אפשר להגיש קבלה לשניהם
- ביטוח פרטי לרוב לא כולל: רפואה משלימה, ליווי סיעודי, לחצן מצוקה, תזונאי, פיזיותרפיה שוטפת
- "כמה אתה משלם על הביטוח הפרטי? בדרך כלל הביטוח עולה 400-800 ש"ח ומתייקר כל שנה. אנחנו 248 קבוע"

===טיפול בהתנגדות "כבר יש לי כתב שירות"===
- שאל מי הספק ומה המחיר
- "כמה אתה משלם? יש לך ליווי סיעודי ולחצן מצוקה כלולים? יש לך 20 טיפולי רפואה משלימה?"
- "אם מה שיש לך פחות מקיף ויקר יותר — שווה לדבר"

===עקרונות ממפגישות אמיתיות===
- "אני לא מוכר לך ביטוח — אני נותן לך ליווי בסיעוד שאין לך אותו היום"
- השתמש בסיפור אישי: "ממקרה שראיתי בעיניים, אנשים שלא היה להם ליווי — הכל נפל על הילדים"
- השתמש בנקודות כאב ספציפיות שהלקוח ציין בשיחה
- "פחות מ-10 שקל ביום" — מסגור המחיר כשמדברים על 248/220

===טכניקה: "אני לא צריך את זה" — מסגרת הרופא + שלב ההשלכות===
כשלקוח אומר "אני לא צריך", הוא לרוב פועל מפחד משינוי ומעדיף את המוכר. אל תתווכח ואל תשכנע — השתמש בגישת הרופא:

שלב 1 — שאל על המצב הנוכחי (ספציפי):
"כשאתה או מישהו מהמשפחה צריך רופא מומחה או MRI, מה התהליך בפועל מול הקופה? כמה זמן אתה מחכה?"

שלב 2 — חבר לתחושה רגשית:
"כשאתה ממתין חודשים בתור בזמן שכואב לך — איך זה מרגיש? מה זה עושה לך ולמשפחה שלך?"

שלב 3 — בנה ספק על המצב הנוכחי:
"תגיד לי בכנות — אתה אוהב את ההתנהלות הזו מול הקופה? אתה נהנה מלהתחנן לתורים?"
(הלקוח יגיד לא → "אז מה עצר אותך עד היום מלמצוא פתרון?")

שלב 4 — ציור ההשלכות (בשקט, בגובה עיניים, כמו רופא):
"בוא נניח ששום דבר לא משתנה. בעוד חצי שנה חס וחלילה מתגלה בעיה שדורשת מומחה דחוף — ואתה עדיין בלי כיסוי, מחכה חודשים. איך ייראו החיים שלך אז? תאר לי איך זה ירגיש לשבת בסלון, סובל מכאבים, כשהילדים שלך מסתכלים עליך ואין לך איך לזרז את הטיפול?"

שלב 5 — שאלת זהות (אל תשאל אם לקנות — שאל מי הוא):
"אחרי שהבנו לאן המצב הנוכחי מוביל... האם אתה מוכן להסתפק במציאות הזו?"
"האחריות של מי זה לוודא שהמשפחה שלך מוגנת — של המדינה, או שלך?"

הכלל: האריה שרודף הוא ההשלכות. כאשר הכאב העתידי נראה גדול יותר מ-248 ש"ח לחודש — ההתנגדות נמסה מעצמה.

===הנחיות לתשובות===
- כתוב תמיד בעברית
- תשובות קצרות וישירות — מקסימום 3 משפטים לכל תשובה
- טבעי ואנושי — כמו שנציג מנוסה מדבר בטלפון
- אל תגיד "כמובן" או "בהחלט" או "בוודאי"
- אל תסביר יותר מדי — הלקוח צריך להרגיש בטוח, לא להבין הכל
- כשיש התנגדות — תאמת רגש → הצג ערך → סגור
- עבור "לא צריך / לא מעוניין" — השתמש תמיד במסגרת הרופא ושלב ההשלכות`;

  const userPrompt = `שלב בשיחה: ${currentStage}
מה הלקוח אמר: "${customerSaid}"

תן לי בדיוק 3 תשובות שונות שאני יכול להגיד עכשיו.
פורמט:
תשובה 1: [הטקסט]
תשובה 2: [הטקסט]
תשובה 3: [הטקסט]`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const text = data.content[0].text;

    // Parse responses
    const lines = text.split('\n').filter(l => l.trim());
    const responses = [];
    let current = '';

    for (const line of lines) {
      if (line.match(/^תשובה\s*\d+\s*:/)) {
        if (current) responses.push(current.trim());
        current = line.replace(/^תשובה\s*\d+\s*:\s*/, '');
      } else if (current) {
        current += '\n' + line;
      }
    }
    if (current) responses.push(current.trim());

    if (responses.length === 0) {
      responses.push(text);
    }

    renderResponses(responses);
  } catch(e) {
    document.getElementById('output').innerHTML = `
      <div class="empty">
        <div class="empty-icon">❌</div>
        <p>שגיאה: ${e.message}</p>
      </div>`;
  }

  btn.disabled = false;
}

function renderResponses(responses) {
  const colors = ['#d4af37','#22c55e','#3b82f6'];
  const html = responses.map((r, i) => `
    <div class="resp-card" style="border-right-color:${colors[i]||'#d4af37'}">
      <span class="resp-num" style="background:${colors[i]||'#d4af37'}">${i+1}</span>
      <button class="copy-btn" onclick="copyText(this, \`${r.replace(/`/g,'\\`')}\`)">העתק</button>
      <div class="resp-text">${r}</div>
    </div>
  `).join('');
  document.getElementById('output').innerHTML = `<div class="responses">${html}</div>`;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ הועתק';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'העתק';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Enter to submit
document.getElementById('customer-said').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    getResponse();
  }
});
</script>
