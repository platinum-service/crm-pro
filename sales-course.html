<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 קורס מכירות פלטינום — מתחילים למאסטרים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1428; --surface:#0f1a2e; --surface2:#1a2744;
  --gold:#d4af37; --gold2:#f4cc55; --text:#e8e8ec; --muted:#8b8b94;
  --border:rgba(212,175,55,0.2); --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Heebo',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--surface),#0d1a33);
  border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px)
}
.header h1{font-size:18px;color:var(--gold);font-weight:700}
.header .nav{margin-right:auto;display:flex;gap:8px}
.header .nav a{
  padding:8px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);text-decoration:none;font-size:13px;font-weight:600
}
.header .nav a:hover{background:var(--gold);color:#000;border-color:var(--gold)}

/* PROGRESS BAR */
.progress-wrap{background:var(--surface);padding:12px 24px;border-bottom:1px solid var(--border)}
.progress-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.6s;border-radius:3px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 110px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{
  background:var(--surface);border-left:1px solid var(--border);
  padding:20px 14px;position:sticky;top:110px;height:fit-content;max-height:calc(100vh - 110px);overflow-y:auto
}
@media(max-width:900px){.sidebar{position:static;max-height:none;border-left:none;border-bottom:1px solid var(--border)}}
.sidebar h3{font-size:12px;color:var(--muted);letter-spacing:1.5px;margin-bottom:14px;font-weight:700}
.ch-item{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;
  cursor:pointer;margin-bottom:4px;transition:all 0.2s;
  border:1px solid transparent
}
.ch-item:hover{background:var(--surface2)}
.ch-item.active{background:var(--surface2);border-color:var(--gold)}
.ch-item .num{
  width:28px;height:28px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  border:1px solid var(--border);flex-shrink:0
}
.ch-item.active .num{background:var(--gold);color:#000;border-color:var(--gold)}
.ch-item.done .num{background:var(--green);color:#fff;border-color:var(--green)}
.ch-item.done .num::after{content:"✓";font-size:14px}
.ch-item.done .num .n{display:none}
.ch-item .title{flex:1;font-size:13px;font-weight:600}
.ch-item .sub{font-size:11px;color:var(--muted);font-weight:400}

/* MAIN CONTENT */
.main{padding:40px 60px;max-width:900px;margin:0 auto}
@media(max-width:900px){.main{padding:24px}}

.chapter-header{margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.chapter-num{font-size:12px;color:var(--gold);letter-spacing:2px;font-weight:700;margin-bottom:6px}
.chapter-title{font-size:32px;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.2}
.chapter-intro{font-size:16px;color:var(--muted);line-height:1.7}

h2{font-size:22px;color:var(--gold);margin:36px 0 14px;font-weight:700}
h3{font-size:17px;color:var(--text);margin:24px 0 10px;font-weight:700}
p{margin-bottom:14px;font-size:15px;line-height:1.8}

.box{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:20px 24px;margin:20px 0
}
.box.highlight{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,175,55,0.06),rgba(212,175,55,0.02))}
.box.rule{border-right:4px solid var(--gold)}
.box.example{border-right:4px solid var(--blue);background:rgba(59,130,246,0.04)}
.box.warn{border-right:4px solid var(--red);background:rgba(239,68,68,0.04)}
.box.ok{border-right:4px solid var(--green);background:rgba(34,197,94,0.04)}

.dialog{background:var(--surface2);border-radius:12px;padding:16px 20px;margin:14px 0}
.dialog .line{margin-bottom:10px;font-size:14px}
.dialog .line:last-child{margin-bottom:0}
.dialog .who{font-weight:700;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:3px}
.dialog .who.cust{color:var(--red)}
.dialog .who.rep{color:var(--green)}

.pill{
  display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;
  background:var(--surface2);color:var(--gold);margin:0 4px
}

ul{margin:10px 20px;padding:0}
ul li{margin-bottom:8px;line-height:1.7;font-size:15px}
ol{margin:10px 20px;padding:0}
ol li{margin-bottom:10px;line-height:1.7;font-size:15px}

.ai-btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;margin:16px 6px 16px 0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:700;transition:transform 0.15s
}
.ai-btn:hover{transform:translateY(-1px)}
.practice-btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;margin:16px 6px 16px 0;
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;text-decoration:none;font-size:13px;font-weight:600
}
.practice-btn:hover{border-color:var(--gold);background:var(--gold);color:#000}

.ai-out{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:18px 22px;margin:12px 0;font-size:15px;line-height:1.8;
  display:none;white-space:pre-wrap
}
.ai-out.visible{display:block}
.ai-out .label{font-size:11px;color:var(--gold);letter-spacing:1.5px;font-weight:700;margin-bottom:10px}

/* QUIZ */
.quiz{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin:30px 0}
.quiz h3{color:var(--gold);margin:0 0 16px;font-size:18px}
.q-item{margin-bottom:18px}
.q-text{font-weight:600;font-size:15px;margin-bottom:10px}
.q-opt{
  display:block;padding:10px 14px;margin:6px 0;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;
  transition:all 0.15s;font-family:'Heebo',sans-serif;width:100%;text-align:right;color:var(--text)
}
.q-opt:hover{border-color:var(--gold)}
.q-opt.correct{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green)}
.q-opt.wrong{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red)}
.q-explain{font-size:13px;color:var(--muted);margin-top:8px;padding:8px 12px;border-right:3px solid var(--gold);background:var(--surface2);border-radius:4px;display:none}
.q-explain.visible{display:block}

/* COMPLETE BUTTON */
.complete-btn{
  display:block;width:100%;padding:14px;margin-top:30px;
  background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;
  border:none;border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;
  font-size:15px;font-weight:700
}
.complete-btn:hover{transform:translateY(-1px)}
.complete-btn.done{background:var(--surface2);color:var(--muted);cursor:default}

/* CERT */
.cert{
  display:none;background:linear-gradient(135deg,#0d1a33,var(--surface2));
  border:2px solid var(--gold);border-radius:16px;padding:40px;text-align:center;margin:40px 0
}
.cert.visible{display:block}
.cert h2{font-size:32px;color:var(--gold);margin-bottom:10px}
.cert p{font-size:16px;color:var(--text);margin-bottom:20px}
.cert .name{font-size:28px;font-weight:800;color:#fff;padding:20px 0;border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);margin:20px 0}

/* MODAL */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;
  align-items:center;justify-content:center;padding:20px
}
.modal-bg.visible{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:28px;max-width:440px;width:100%
}
.modal h2{color:var(--gold);margin-bottom:10px}
.modal input{
  width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;margin:10px 0;font-family:'Heebo',sans-serif
}
.modal button{
  width:100%;padding:10px;background:var(--gold);color:#000;border:none;
  border-radius:8px;cursor:pointer;font-weight:700;font-family:'Heebo',sans-serif
}

/* DOT TYPING */
.typing{display:inline-flex;gap:4px;padding:6px 0}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:tp 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes tp{0%,60%,100%{opacity:0.3}30%{opacity:1}}
</style>
</head>
<body>

<!-- API MODAL -->
<div class="modal-bg" id="apiModal">
  <div class="modal">
    <h2>🔑 מפתח API</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">נשמר בדפדפן בלבד.</p>
    <input type="password" id="apiKey" placeholder="sk-ant-api..."/>
    <button onclick="saveKey()">שמור</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>🎓 קורס מכירות פלטינום</h1>
  <div class="nav">
    <a href="sales-agent-v2.html">← סוכן חי</a>
    <a href="sales-training.html">🥊 תרגול</a>
    <a href="sales-dashboard.html">📊 דשבורד</a>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-label">
    <span>התקדמות בקורס</span>
    <span id="progressText">0/7 פרקים</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>תוכן הקורס</h3>
  <div id="chapterList"></div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

</div>

<script>
// ════════════════════════════════════
// COURSE DATA — 7 chapters
// ════════════════════════════════════
const CHAPTERS = [
  {
    id:1, num:'01', icon:'🧘',
    title:'מסגרת הרופא',
    sub:'מיינדסט הבסיס',
    intro:'המכירה מתחילה לפני שפתחת את הפה. הטון, הנוכחות, והניתוק מהתוצאה — הם יותר חשובים מכל מילה שתגיד.',
    body:`
      <h2>הרעיון: רופא ולא מוכר</h2>
      <p>דמיין רופא טוב. הוא לא רודף אחריך להזמין ניתוח. הוא <strong>שואל שאלות</strong>, <strong>מקשיב</strong>, <strong>מאבחן</strong>, ואז אומר: "לדעתי המקצועית, זה מה שאתה צריך. אתה מוזמן לחשוב על זה."</p>
      <p>זו בדיוק העמדה שלך כנציג. אתה לא "מוכר" — אתה מאבחן מצב ונותן המלצה.</p>

      <div class="box rule">
        <h3>3 העקרונות של הרופא</h3>
        <ol>
          <li><strong>טון שקט</strong> — לא להתלהב. רופא לא צועק "יש לי בשורה בשבילך!"</li>
          <li><strong>גובה עיניים</strong> — לא למעלה (נלחצים) ולא למטה (מתחננים). שווה לשווה.</li>
          <li><strong>ניתוק מהתוצאה</strong> — "אם זה מתאים לך — מעולה. אם לא — בסדר גמור." הלקוח מרגיש את זה.</li>
        </ol>
      </div>

      <h2>למה זה עובד</h2>
      <p>לקוחות פיתחו אלרגיה למוכרים לחוצים. ברגע שהם מרגישים "הוא רוצה את זה יותר ממני" — הם סוגרים. ברגע שהם מרגישים "הוא שלם עם עצמו, אין לחץ" — הם פותחים.</p>

      <div class="box example">
        <div class="dialog">
          <div class="line"><div class="who cust">לקוח:</div>יקר לי</div>
          <div class="line"><div class="who rep">נציג רגיל:</div>לא לא, זה זול מאוד! תחשוב שזה רק 8 שקל ביום! זה כלום!</div>
          <div class="line"><div class="who rep">נציג-רופא:</div>מבין. תגיד לי — <em>למה</em> זה יקר לך? יש משהו ספציפי בחודש שמהדק?</div>
        </div>
      </div>

      <div class="box warn">
        <h3>הסימפטומים של "נציג לחוץ"</h3>
        <ul>
          <li>מדבר מהר מדי</li>
          <li>קוטע את הלקוח</li>
          <li>משתמש במילים "רק", "פשוט", "בלבד" יותר מדי</li>
          <li>חוזר על אותה תועלת 3 פעמים</li>
          <li>אומר "כן?" בסוף כל משפט כמחפש אישור</li>
        </ul>
      </div>
    `,
    practice:{ scenario:'price_objection', label:'🥊 תרגל — התמודדות עם "יקר לי" בטון שקט' },
    quiz:[
      {
        q:'לקוח אומר "אני לא מעוניין" מיד בתחילת השיחה. תגובת "נציג-רופא" היא:',
        opts:[
          { t:'"רגע רגע, תן לי רק 30 שניות, זה חשוב!"', ok:false, e:'לחץ → דחייה. זו תגובה של מוכר, לא של רופא.' },
          { t:'"בסדר גמור. רק לפני שאני סוגר — מה בדיוק לא מעניין?"', ok:true, e:'שחרור + שאלה = הלקוח חייב לחשוב. זה פותח שיחה.' },
          { t:'"אז למה ענית לטלפון בכלל?"', ok:false, e:'תוקפנות = סגירת דלת.' }
        ]
      },
      {
        q:'מה ההבדל המרכזי בין "רופא" למוכר?',
        opts:[
          { t:'הרופא משתמש במילים רפואיות', ok:false, e:'הנושא הוא הגישה, לא האוצר מילים.' },
          { t:'הרופא מנותק מהתוצאה — אין לו לחץ למכור', ok:true, e:'ניתוק מהתוצאה = מקור הסמכות. הלקוח מרגיש שאתה לא צריך אותו.' },
          { t:'הרופא עובד לפי שעות', ok:false, e:'לא רלוונטי.' }
        ]
      }
    ]
  },

  {
    id:2, num:'02', icon:'🎯',
    title:'7 שלבי מנשרוב',
    sub:'מסע פסיכולוגי של לקוח',
    intro:'כל לקוח עובר מסע פסיכולוגי: מזר לחשדן, מחשדן למתעניין, ממתעניין למחויב. אם תדלג על שלב — תאבד את המכירה.',
    body:`
      <h2>המפה המלאה</h2>
      <p>רון מנשרוב — אחד המוכרים הגדולים בישראל — גילה שכל מכירה מורכבת מ-7 שלבים בסדר קבוע. אי אפשר לדלג. אי אפשר להחליף סדר.</p>

      <div class="box highlight">
        <h3>🗺️ המסע</h3>
        <ol>
          <li><strong>חיבור (Connection)</strong> — "אתה מדבר עם בן אדם, לא עם מוכר"</li>
          <li><strong>מצב נוכחי (Current)</strong> — "מה המצב שלך עכשיו?"</li>
          <li><strong>בעיה/כאב (Problem)</strong> — "מה בזה מפריע לך?"</li>
          <li><strong>פער (Gap)</strong> — "מה תרצה שיהיה שונה?"</li>
          <li><strong>זהות (Identity)</strong> — "אתה סוג של אדם ש..."</li>
          <li><strong>מחויבות (Commitment)</strong> — "מוכן להתחיל?"</li>
          <li><strong>סגירה (Close)</strong> — "טכני — מה התעודת זהות?"</li>
        </ol>
      </div>

      <h2>שלב אחר שלב — דוגמה מלאה</h2>

      <h3>1. חיבור</h3>
      <div class="box example">
        <p><em>"שלום יוסי, מנחם מפלטינום. אני לא הולך להציק לך, רק להכיר שני דקות — אתה מהרצליה?"</em></p>
        <p style="font-size:13px;color:var(--muted)">קוטעים לחשד עם שקיפות + שאלה אישית.</p>
      </div>

      <h3>2. מצב נוכחי</h3>
      <div class="box example">
        <p><em>"מה יש לך היום לעניין בריאות? קופה בלבד או עוד משהו?"</em></p>
      </div>

      <h3>3. בעיה / כאב</h3>
      <div class="box example">
        <p><em>"ומה קורה לך כשאתה צריך רופא פרטי — לקחת כבר?"</em></p>
        <p><em>"כמה זה עלה? ו-כמה אתה מעריך שזה יעלה לך בשנה הקרובה?"</em></p>
      </div>

      <h3>4. פער</h3>
      <div class="box example">
        <p><em>"ומה תרצה? שלא תצטרך לחשוב על כסף ברגע שאתה חולה?"</em></p>
      </div>

      <h3>5. זהות</h3>
      <div class="box example">
        <p><em>"אתה נשמע לי סוג של אדם שמעדיף לסגור עניין מראש מאשר לרוץ ברגע האחרון, נכון?"</em></p>
      </div>

      <h3>6. מחויבות</h3>
      <div class="box example">
        <p><em>"נשמע שזה בדיוק בשבילך. מוכן שנפיק לך את הפוליסה עכשיו?"</em></p>
      </div>

      <h3>7. סגירה</h3>
      <div class="box example">
        <p><em>"מצוין. תן לי בבקשה תעודת זהות ואימייל, ואני מטפל בכל השאר."</em></p>
      </div>

      <div class="box warn">
        <h3>הטעות הגדולה של 90% מהנציגים</h3>
        <p>מדלגים משלב 2 ישר ל-7. שואלים "מה המצב?" ואז "מוכן לסגור?". זה לא עובד. הלקוח צריך <strong>להרגיש את הכאב</strong> (שלב 3) לפני שהוא קונה פתרון.</p>
      </div>
    `,
    practice:{ scenario:'cold_lead', label:'🥊 תרגל — שיחה מלאה לפי 7 השלבים' },
    quiz:[
      {
        q:'באיזה שלב שואלים "מה התעודת זהות?"',

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let currentChapter = 1;
let apiKey = localStorage.getItem('anthropic_key') || '';

function loadProgress(){
  try { return JSON.parse(localStorage.getItem('course_progress')||'{}'); } catch(e){ return {}; }
}
function saveProgress(p){ localStorage.setItem('course_progress', JSON.stringify(p)); }

// ════════════════════════════════════
// RENDER
// ════════════════════════════════════
function renderSidebar(){
  const progress = loadProgress();
  const html = CHAPTERS.map(ch => `
    <div class="ch-item ${currentChapter===ch.id?'active':''} ${progress[ch.id]?'done':''}" onclick="selectChapter(${ch.id})">
      <div class="num"><span class="n">${ch.num}</span></div>
      <div>
        <div class="title">${ch.icon} ${ch.title}</div>
        <div class="sub">${ch.sub}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('chapterList').innerHTML = html;

  const done = Object.keys(progress).length;
  document.getElementById('progressText').textContent = `${done}/7 פרקים`;
  document.getElementById('progressFill').style.width = (done/7*100)+'%';
}

function selectChapter(id){
  currentChapter = id;
  renderSidebar();
  renderMain();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderMain(){
  const ch = CHAPTERS.find(c => c.id === currentChapter);
  if (!ch) return;
  const progress = loadProgress();
  const isDone = !!progress[ch.id];

  const quizHtml = ch.quiz.map((q,i) => `
    <div class="q-item" data-q="${i}">
      <div class="q-text">${i+1}. ${q.q}</div>
      ${q.opts.map((o,oi) => `<button class="q-opt" onclick="checkAnswer(${i},${oi})">${o.t}</button>`).join('')}
      <div class="q-explain" id="expl-${i}"></div>
    </div>
  `).join('');

  const html = `
    <div class="chapter-header">
      <div class="chapter-num">פרק ${ch.num}</div>
      <div class="chapter-title">${ch.icon} ${ch.title}</div>
      <div class="chapter-intro">${ch.intro}</div>
    </div>

    ${ch.body}

    <div>
      <button class="ai-btn" onclick="explainDeeper(${ch.id})">✦ בקש מ-AI הסבר עמוק יותר</button>
      <a class="practice-btn" href="sales-training.html">${ch.practice.label} →</a>
    </div>
    <div class="ai-out" id="aiOut"><div class="label">✦ AI מסביר</div><div id="aiOutText"></div></div>

    <div class="quiz">
      <h3>🧠 בוחן קצר (${ch.quiz.length} שאלות)</h3>
      ${quizHtml}
    </div>

    <button class="complete-btn ${isDone?'done':''}" onclick="completeChapter(${ch.id})" ${isDone?'disabled':''}>
      ${isDone ? '✓ פרק הושלם' : 'סיים פרק והמשך →'}
    </button>

    <div class="cert ${Object.keys(loadProgress()).length === 7 && ch.id === 7 ? 'visible' : ''}">
      <h2>🏆 סיימת את הקורס!</h2>
      <p>ברכות — אתה עכשיו מוכן לשיחות אמת.</p>
      <div class="name">מנחם רחמימוב</div>
      <p>קורס מכירות פלטינום — 7 פרקים שהושלמו</p>
      <p style="color:var(--muted);font-size:13px;margin-top:10px">מומלץ: תרגל לפחות 5 שיחות אימון לפני שיחה אמיתית</p>
      <a class="practice-btn" href="sales-training.html" style="margin-top:10px;display:inline-block">🥊 התחל תרגול</a>
    </div>
  `;
  document.getElementById('main').innerHTML = html;
}

function checkAnswer(qi, oi){
  const ch = CHAPTERS.find(c => c.id === currentChapter);
  const q = ch.quiz[qi];
  const container = document.querySelector(`.q-item[data-q="${qi}"]`);
  const buttons = container.querySelectorAll('.q-opt');
  buttons.forEach((b,i) => {
    b.disabled = true;
    if (q.opts[i].ok) b.classList.add('correct');
    if (i === oi && !q.opts[i].ok) b.classList.add('wrong');
  });
  const expl = document.getElementById(`expl-${qi}`);
  expl.textContent = (q.opts[oi].ok ? '✅ נכון! ' : '❌ ') + q.opts[oi].e;
  expl.classList.add('visible');
}

function completeChapter(id){
  const progress = loadProgress();
  progress[id] = { at: new Date().toISOString() };
  saveProgress(progress);
  renderSidebar();

  // auto-advance
  const next = CHAPTERS.find(c => c.id === id+1);
  if (next) {
    setTimeout(() => selectChapter(next.id), 500);
  } else {
    renderMain(); // re-render to show cert
  }
}

// ════════════════════════════════════
// AI DEEP DIVE
// ════════════════════════════════════
async function explainDeeper(chId){
  if (!apiKey) { document.getElementById('apiModal').classList.add('visible'); return; }

  const ch = CHAPTERS.find(c => c.id === chId);
  const out = document.getElementById('aiOut');
  const text = document.getElementById('aiOutText');
  out.classList.add('visible');
  text.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-opus-4-7',
        max_tokens:1200,
        stream:true,
        system:`אתה מאמן מכירות בכיר בפלטינום. אתה מלמד נציג שזה עתה קרא פרק בקורס. הסבר בעברית, קולח, עם דוגמאות מעשיות מעולם הביטוח הבריאותי. 400-500 מילים מקסימום. אל תחזור על מה שכתוב בפרק — הוסף עומק, ניואנסים, סיפורים מהשטח.`,
        messages:[{
          role:'user',
          content:`הפרק שקראתי: "${ch.title}"\nתוכן: ${ch.intro}\n\nתן לי הסבר עומק — דוגמאות נוספות מהשטח, טעויות נפוצות שנציגים עושים בנושא הזה, וטיפ מתקדם אחד שלא כתוב בפרק.`
        }]
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === 'content_block_delta' && data.delta?.text) {
              full += data.delta.text;
              text.innerHTML = full.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');
            }
          } catch {}
        }
      }
    }
  } catch(e) {
    text.textContent = 'שגיאה: ' + e.message;
  }
}

function saveKey(){
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('anthropic_key', k);
  apiKey = k;
  document.getElementById('apiModal').classList.remove('visible');
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
renderSidebar();
renderMain();
</script>
