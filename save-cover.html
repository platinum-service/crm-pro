<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>שמור תמונת כריכה</title>
<style>
  body { background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; font-family: Arial; }
  canvas { box-shadow: 0 12px 48px rgba(0,0,0,0.6); max-width: 100%; }
  button { background: #d4af37; color: #1a2744; border: none; padding: 14px 36px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
  button:hover { background: #f0d060; }
</style>
</head>
<body>
<canvas id="c" width="820" height="312"></canvas>
<button onclick="download()">⬇️ שמור כריכה לפייסבוק</button>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// ─── Background ───
const grad = ctx.createLinearGradient(0, 0, 820, 312);
grad.addColorStop(0, '#0d1628');
grad.addColorStop(0.45, '#1a2744');
grad.addColorStop(1, '#1e2f52');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 820, 312);

// ─── Subtle diagonal light beam ───
const beam = ctx.createLinearGradient(0, 0, 820, 312);
beam.addColorStop(0, 'rgba(212,175,55,0)');
beam.addColorStop(0.5, 'rgba(212,175,55,0.04)');
beam.addColorStop(1, 'rgba(212,175,55,0)');
ctx.fillStyle = beam;
ctx.fillRect(0, 0, 820, 312);

// ─── Decorative circles right ───
for (let r = 50; r <= 220; r += 38) {
  ctx.strokeStyle = `rgba(212,175,55,${0.18 - r*0.0006})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(760, 156, r, 0, Math.PI * 2);
  ctx.stroke();
}

// ─── Faded big פ background right ───
ctx.save();
ctx.globalAlpha = 0.05;
ctx.fillStyle = '#d4af37';
ctx.font = 'bold 260px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('פ', 740, 165);
ctx.restore();

// ─── Gold top border line ───
const topLine = ctx.createLinearGradient(0, 0, 820, 0);
topLine.addColorStop(0, 'rgba(212,175,55,0)');
topLine.addColorStop(0.3, 'rgba(212,175,55,0.9)');
topLine.addColorStop(0.7, 'rgba(212,175,55,0.9)');
topLine.addColorStop(1, 'rgba(212,175,55,0)');
ctx.strokeStyle = topLine;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(0, 3);
ctx.lineTo(820, 3);
ctx.stroke();

// ─── Gold bottom border line ───
ctx.strokeStyle = topLine;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(0, 309);
ctx.lineTo(820, 309);
ctx.stroke();

// ─── Logo circle left ───
ctx.strokeStyle = 'rgba(212,175,55,0.6)';
ctx.lineWidth = 2.5;
ctx.beginPath();
ctx.arc(108, 156, 78, 0, Math.PI * 2);
ctx.stroke();

ctx.strokeStyle = 'rgba(212,175,55,0.2)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.arc(108, 156, 88, 0, Math.PI * 2);
ctx.stroke();

// פ letter in circle
ctx.fillStyle = '#d4af37';
ctx.font = 'bold 110px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('פ', 108, 155);

// ─── Authorized marketer under logo ───
ctx.font = '12px Arial';
ctx.fillStyle = 'rgba(212,175,55,0.7)';
ctx.textAlign = 'center';
ctx.textBaseline = 'top';
ctx.fillText('משווק מורשה של פלטינום', 108, 242);
ctx.fillText('רפואה משלימה בע"מ', 108, 258);

// ─── Vertical divider ───
const divGrad = ctx.createLinearGradient(0, 40, 0, 272);
divGrad.addColorStop(0, 'rgba(212,175,55,0)');
divGrad.addColorStop(0.3, 'rgba(212,175,55,0.7)');
divGrad.addColorStop(0.7, 'rgba(212,175,55,0.7)');
divGrad.addColorStop(1, 'rgba(212,175,55,0)');
ctx.strokeStyle = divGrad;
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(210, 40);
ctx.lineTo(210, 272);
ctx.stroke();

// ─── Main title ───
ctx.fillStyle = '#d4af37';
ctx.font = 'bold 46px Arial';
ctx.textAlign = 'right';
ctx.textBaseline = 'top';
ctx.fillText('פלטינום כתב שירות', 590, 46);

// ─── Gold underline under title ───
const ulGrad = ctx.createLinearGradient(240, 0, 590, 0);
ulGrad.addColorStop(0, 'rgba(212,175,55,0)');
ulGrad.addColorStop(0.2, 'rgba(212,175,55,0.9)');
ulGrad.addColorStop(1, 'rgba(212,175,55,0.9)');
ctx.strokeStyle = ulGrad;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(240, 103);
ctx.lineTo(590, 103);
ctx.stroke();

// ─── Tagline — main message ───
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 26px Arial';
ctx.textAlign = 'right';
ctx.fillText('כתב השירות המורחב ביותר בישראל', 590, 118);

// ─── Feature bullets ───
const features = [
  '✦  ללא הצהרת בריאות',
  '✦  החזרים עד 80% על טיפולים',
  '✦  רפואה משלימה כלולה',
];
ctx.font = '19px Arial';
ctx.fillStyle = 'rgba(212,175,55,0.9)';
let y = 160;
for (const f of features) {
  ctx.fillText(f, 590, y);
  y += 30;
}

// ─── Horizontal divider before bottom ───
ctx.strokeStyle = 'rgba(212,175,55,0.25)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(240, 258);
ctx.lineTo(600, 258);
ctx.stroke();

// ─── Bottom row ───
ctx.font = '16px Arial';
ctx.fillStyle = 'rgba(255,255,255,0.5)';
ctx.textAlign = 'right';
ctx.fillText('platinum-service.co.il  |  051-502-0261  |  שירות 24/7', 590, 268);


function download() {
  const link = document.createElement('a');
  link.download = 'platinum-cover.png';
  link.href = c.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
