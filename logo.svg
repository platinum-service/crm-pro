<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a2744" rx="40"/>

  <!-- Gold ring / circle decoration -->
  <circle cx="200" cy="175" r="110" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.4"/>
  <circle cx="200" cy="175" r="120" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2"/>

  <!-- Letter פ (Pe) in gold -->
  <text
    x="200"
    y="230"
    font-family="Arial, Heebo, sans-serif"
    font-size="160"
    font-weight="bold"
    fill="#d4af37"
    text-anchor="middle"
    dominant-baseline="middle"
  >פ</text>

  <!-- Bottom text -->
  <text
    x="200"
    y="330"
    font-family="Arial, Heebo, sans-serif"
    font-size="28"
    font-weight="600"
    fill="#d4af37"
    text-anchor="middle"
    letter-spacing="3"
  >PLATINUM</text>

  <!-- Thin gold line under text -->
  <line x1="100" y1="348" x2="300" y2="348" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>

  <!-- Small subtitle -->
  <text
    x="200"
    y="372"
    font-family="Arial, Heebo, sans-serif"
    font-size="16"
    fill="#d4af37"
    text-anchor="middle"
    opacity="0.8"
  >כתב שירות</text>
</svg>
